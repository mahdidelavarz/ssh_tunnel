name: Deploy Spoof Tunnel

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Base64 encode local file
        run: |
          base64 -w0 spoofTunnel > spoofTunnel.b64

      - name: Deploy to Germany
        uses: appleboy/ssh-action@v1
        with:
          host: 46.225.109.36
          username: root
          password: ${{ secrets.GERMAN_PASS }}
          port: 22
          script: |
            cd /root
            echo "$(cat spoofTunnel.b64)" | base64 -d > spoof-tunnel
            chmod +x spoof-tunnel
            ./spoof-tunnel --help
