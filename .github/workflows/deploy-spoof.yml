name: Deploy Spoof Tunnel

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Copy spoofTunnel to Germany
        run: |
          # First, create the directory on Germany server
          sshpass -p "${{ secrets.GERMAN_PASS }}" ssh -o StrictHostKeyChecking=no root@46.225.109.36 "mkdir -p /root/spoof-tunnel"
          
          # Then copy the file using the -O flag (forces legacy scp protocol, more reliable)
          sshpass -p "${{ secrets.GERMAN_PASS }}" scp -O -o StrictHostKeyChecking=no spoofTunnel root@46.225.109.36:/root/spoof-tunnel/spoof-tunnel
          
          # Make it executable and test
          sshpass -p "${{ secrets.GERMAN_PASS }}" ssh -o StrictHostKeyChecking=no root@46.225.109.36 "chmod +x /root/spoof-tunnel/spoof-tunnel && /root/spoof-tunnel/spoof-tunnel --help"
