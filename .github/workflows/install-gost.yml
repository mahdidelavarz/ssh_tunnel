name: Test SSH Connection

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Test SSH connection
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GERMAN_IP }}
          username: ${{ secrets.GERMAN_USER }}
          password: ${{ secrets.GERMAN_PASS }}
          port: 22
          script: echo "Connected successfully!"
