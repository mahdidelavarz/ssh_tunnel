name: Test SSH Connection

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Test if port 22 is open
        run: |
          timeout 5 bash -c "echo >/dev/tcp/${{ secrets.GERMAN_IP }}/22" && echo "Port 22 is OPEN" || echo "Port 22 is CLOSED or TIMEOUT"

      - name: Show IP address being used
        run: |
          echo "IP: ${{ secrets.GERMAN_IP }}"
          echo "User: ${{ secrets.GERMAN_USER }}"
