name: SSH Test (Debian 12 - Password)

on:
  workflow_dispatch:

jobs:
  ssh-test:
    runs-on: ubuntu-latest

    steps:
      - name: Install sshpass
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass

      - name: Test SSH Connection to Debian 12
        run: |
          sshpass -p "${{ secrets.GERMANY_PASSWORD }}" \
          ssh \
            -o StrictHostKeyChecking=no \
            -o PreferredAuthentications=password \
            -o PubkeyAuthentication=no \
            -o ConnectTimeout=15 \
            -p ${{ secrets.GERMANY_PORT }} \
            ${{ secrets.GERMANY_USER }}@${{ secrets.GERMANY_IP }} \
            "echo 'CONNECTED SUCCESSFULLY'; whoami; hostnamectl; uptime"
