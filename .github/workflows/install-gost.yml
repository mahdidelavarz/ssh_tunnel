name: SSH Debug Test (Debian 12)

on:
  workflow_dispatch:

jobs:
  ssh-debug:
    runs-on: ubuntu-latest

    steps:
      - name: Install sshpass
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass

      - name: SSH debug connection
        run: |
          echo "Testing connection to ${{ secrets.GERMANY_IP }}:${{ secrets.GERMANY_PORT }}"
          sshpass -p "${{ secrets.GERMANY_PASSWORD }}" \
          ssh -vvv \
            -o StrictHostKeyChecking=no \
            -o PreferredAuthentications=password \
            -o PubkeyAuthentication=no \
            -o ConnectTimeout=15 \
            -p ${{ secrets.GERMANY_PORT }} \
            ${{ secrets.GERMANY_USER }}@${{ secrets.GERMANY_IP }} \
            "echo OK"
