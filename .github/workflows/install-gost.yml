name: Install GOST on Germany Server

on:
  workflow_dispatch:
    inputs:
      commands:
        description: 'دستورات مورد نظر (با خط جدید جدا کنید)'
        required: true
        default: |
          apt update
          apt install -y wget curl
          cd /root
          wget https://github.com/go-gost/gost/releases/download/v3.2.5/gost_3.2.5_linux_amd64.tar.gz
          tar -xzf gost_3.2.5_linux_amd64.tar.gz
          chmod +x gost
          mv gost /usr/local/bin/
          gost -V

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - name: اتصال به سرور آلمان و اجرای دستورات
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.GERMAN_IP }}
          username: ${{ secrets.GERMAN_USER }}
          password: ${{ secrets.GERMAN_PASS }}
          port: 22
          script: |
            echo "✅ متصل شدم به سرور آلمان"
            echo "------------------------"
            ${{ github.event.inputs.commands }}
            echo "------------------------"
            echo "✅ اجرای دستورات تمام شد"
