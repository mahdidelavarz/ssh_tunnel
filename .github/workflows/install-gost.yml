name: Debug SSH Connection

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Run basic commands on Germany server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.GERMAN_IP }}
          username: ${{ secrets.GERMAN_USER }}
          password: ${{ secrets.GERMAN_PASS }}
          port: 22
          script: |
            echo "=== 1. Check if connected ==="
            whoami
            pwd
            echo "=== 2. Check OS version ==="
            cat /etc/os-release | head -3
            echo "=== 3. Check PATH ==="
            echo $PATH
            echo "=== 4. Check if wget exists ==="
            which wget || echo "wget not found"
            echo "=== 5. Check if curl exists ==="
            which curl || echo "curl not found"
