name: Install GOST on Germany Server

on:
  workflow_dispatch:
    inputs:
      command:
        description: 'دستوری که میخوای روی سرور اجرا بشه'
        required: true
        default: 'gost -V'

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - name: Execute command on Germany server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GERMAN_IP }}
          username: ${{ secrets.GERMAN_USER }}
          password: ${{ secrets.GERMAN_PASS }}
          port: 22
          script: |
            echo "✅ Connected to Germany server"
            echo "------------------------"
            ${{ github.event.inputs.command }}
            echo "------------------------"
