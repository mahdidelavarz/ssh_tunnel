yaml
name: SSH Test (Password Auth)

on:
  workflow_dispatch:

jobs:
  ssh-test:
    runs-on: ubuntu-latest

    steps:
      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: SSH and run test command
        run: |
          sshpass -p "${{ secrets.GERMANY_PASSWORD }}" \
          ssh -o StrictHostKeyChecking=no \
              -p ${{ secrets.GERMANY_PORT }} \
              ${{ secrets.GERMANY_USER }}@${{ secrets.GERMANY_IP }} \
              "whoami && hostname && uptime"
