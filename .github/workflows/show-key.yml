name: Show SSH Key

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate SSH key pair
        run: |
          ssh-keygen -t rsa -b 4096 -f ~/.ssh/id_rsa -N ""
          echo "PUBLIC KEY:" > output.txt
          cat ~/.ssh/id_rsa.pub >> output.txt
          echo "" >> output.txt
          echo "PRIVATE KEY:" >> output.txt
          cat ~/.ssh/id_rsa >> output.txt
      - name: Upload output
        uses: actions/upload-artifact@v4
        with:
          name: ssh-keys
          path: output.txt
