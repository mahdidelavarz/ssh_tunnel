name: Execute on Germany Ubuntu Server

on:
  workflow_dispatch:
    inputs:
      command:
        description: 'Command to run on Germany server'
        required: true
        default: 'pwd && ls -la'
        type: string
      is_long_running:
        description: 'Check if command is a long installation'
        required: false
        default: false
        type: boolean

jobs:
  execute:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 30
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Run command on Germany server
        run: |
          export SSHPASS="${{ secrets.GERMAN_PASS }}"
          
          SSH_OPTS="-o StrictHostKeyChecking=no -o ServerAliveInterval=60 -o ServerAliveCountMax=5"
          
          echo "# Germany Server - $(date)" > status.md
          echo "" >> status.md
          echo "## Command: \`${{ github.event.inputs.command }}\`" >> status.md
          echo '```' >> status.md
          
          # Capture exit code properly
          set +e  # Don't exit on error
          
          if [ "${{ github.event.inputs.is_long_running }}" = "true" ]; then
            sshpass -e ssh -tt $SSH_OPTS root@49.12.68.126 "${{ github.event.inputs.command }}" 2>&1 | tee -a status.md
            EXIT_CODE=${PIPESTATUS[0]}
          else
            sshpass -e ssh $SSH_OPTS root@49.12.68.126 "${{ github.event.inputs.command }}" 2>&1 | tee -a status.md
            EXIT_CODE=${PIPESTATUS[0]}
          fi
          
          set -e  # Re-enable exit on error
          
          echo '```' >> status.md
          echo "" >> status.md
          echo "## Exit Code: $EXIT_CODE" >> status.md
          
          # Exit with the actual exit code
          exit $EXIT_CODE
          
      - name: Commit and push result
        if: always()  # Always commit even if command fails
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add status.md
          git commit -m "Execute: ${{ github.event.inputs.command }}" || echo "No changes"
          git push
